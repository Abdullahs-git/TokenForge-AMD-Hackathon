name: TokenForge CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: pandabutt/amd-act2-router
  DOCKER_TAG: latest

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Lint & Unit Test
  # ─────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify module imports
        run: |
          python -c "import main; import router; import local_solvers; print('✅ All v8.0 modules imported successfully')"

      - name: Verify Tier 0 SymPy Math Solver
        run: |
          python -c "
          from local_solvers import solve_math_expression
          assert solve_math_expression('What is 144 / 12?') == '12'
          assert solve_math_expression('Calculate 25 * 4') == '100'
          assert solve_math_expression('What is the capital of France?') is None
          print('✅ Tier 0 SymPy Math Solver verified successfully')
          "

      - name: Verify Output Sanitizer & Quality-Maximized Prompting
        run: |
          python -c "
          from router import sanitize_output, select_best_model
          assert sanitize_output('<think>reasoning step</think>Direct answer.') == 'Direct answer.'
          models = ['accounts/fireworks/models/llama-v3p1-8b-instruct', 'accounts/fireworks/models/minimax-m3']
          best = select_best_model('Explain quantum physics', models)
          assert 'minimax-m3' in best
          print('✅ Output sanitizer & model tierer verified successfully')
          "

      - name: Run headless evaluation (offline mode)
        run: |
          python main.py
          echo "✅ main.py exited with code 0"

      - name: Validate output JSON schema
        run: |
          python -c "
          import json
          with open('output/results.json') as f:
              results = json.load(f)
          assert isinstance(results, list), 'Output must be a JSON array'
          for r in results:
              assert 'task_id' in r, f'Missing task_id in {r}'
              assert 'answer' in r, f'Missing answer in {r}'
              assert isinstance(r['task_id'], str), f'task_id must be string: {r}'
              assert isinstance(r['answer'], str), f'answer must be string: {r}'
              assert len(r['answer'].strip()) > 0, f'answer must be non-empty: {r}'
          print(f'✅ Valid JSON schema: {len(results)} tasks with task_id + non-empty answer')
          "

  # ─────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image manifest
        run: |
          docker manifest inspect ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          echo "✅ Image pushed and publicly accessible: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
