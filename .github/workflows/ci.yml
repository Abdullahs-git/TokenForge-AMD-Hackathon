name: TokenForge CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: pandabutt/amd-act2-router
  DOCKER_TAG: latest

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Lint & Unit Test
  # ─────────────────────────────────────────────────────
  test:
    name: 🧪 Lint & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify module imports
        run: |
          python -c "import main; import router; import llm_clients; import local_solvers; import output_sanitizer; print('✅ All modules imported successfully')"

      - name: Verify 8-category classifier
        run: |
          python -c "
          from router import detect_category
          tests = {
              'What is the capital of France?': 'factual',
              'Calculate 15% of 240': 'math',
              'Classify the sentiment of this review': 'sentiment',
              'Summarize the following paragraph': 'summarization',
              'Extract all named entities from the text': 'ner',
              'This function has a bug: def get_max': 'code_debug',
              'Three friends each own a different pet. Sam does not own the bird': 'logical',
              'Write a Python function that returns the second-largest number': 'code_gen',
          }
          passed = 0
          for prompt, expected in tests.items():
              result = detect_category(prompt)
              status = '✅' if result == expected else '❌'
              print(f'{status} \"{prompt[:50]}...\" → {result} (expected: {expected})')
              if result == expected:
                  passed += 1
          print(f'\nClassifier accuracy: {passed}/{len(tests)}')
          assert passed == len(tests), f'Classifier failed {len(tests) - passed} tests'
          "

      - name: Verify output sanitizer
        run: |
          python -c "
          from output_sanitizer import strip_formatting, extract_answer, validate_answer
          # Test markdown stripping
          assert '**' not in strip_formatting('**bold text**')
          assert strip_formatting('# Header') == 'Header'
          # Test validate
          assert validate_answer('This is a valid answer') == True
          assert validate_answer('') == False
          assert validate_answer('[Local Offline Mode] test') == False
          print('✅ Output sanitizer tests passed')
          "

      - name: Run headless evaluation (offline mode)
        run: |
          python main.py
          echo "✅ main.py exited with code 0"

      - name: Validate output JSON schema
        run: |
          python -c "
          import json
          with open('output/results.json') as f:
              results = json.load(f)
          assert isinstance(results, list), 'Output must be a JSON array'
          for r in results:
              assert 'task_id' in r, f'Missing task_id in {r}'
              assert 'answer' in r, f'Missing answer in {r}'
              assert isinstance(r['task_id'], str), f'task_id must be string: {r}'
              assert isinstance(r['answer'], str), f'answer must be string: {r}'
              assert len(r['answer'].strip()) > 0, f'answer must be non-empty: {r}'
          print(f'✅ Valid JSON schema: {len(results)} tasks with task_id + non-empty answer')
          "

  # ─────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Image
  # ─────────────────────────────────────────────────────
  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image manifest
        run: |
          docker manifest inspect ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          echo "✅ Image pushed and publicly accessible: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}"
